<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlyTax - Workspace AI</title>
    <script>
      (function () {
        const savedTheme = localStorage.getItem("flytax-theme");
        if (savedTheme === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="workspace-orbit orbit-a"></div>
    <div class="workspace-orbit orbit-b"></div>

    <div class="chat-header">
      <div class="container-fluid shell-container">
        <a class="navbar-brand-chat fw-bold fs-3" href="index.html">
          <img src="logo.png" alt="FlyTax Logo" class="chat-logo" />
          Fly<span class="text-primary">Tax</span>
        </a>
        <div class="header-actions">
          <button class="btn btn-light shell-btn theme-toggle" id="themeToggle" type="button" aria-label="Attiva tema scuro">
            <i class="fas fa-moon"></i>
            <span>Tema scuro</span>
          </button>
          <button class="btn btn-light shell-btn" id="newChatButton" type="button">
            <i class="fas fa-plus"></i> Nuova chat
          </button>
          <a class="btn btn-light shell-btn" href="admin.html">
            <i class="fas fa-chart-line"></i> Dashboard
          </a>
        </div>
      </div>
    </div>

    <div class="workspace-shell">
      <aside class="history-panel">
        <div class="panel-card history-card">
          <div class="panel-header">
            <div>
              <p class="panel-eyebrow">Cronologia</p>
              <h2 class="panel-title">Chat salvate</h2>
            </div>
            <button class="btn btn-sm btn-outline-secondary" id="refreshHistoryButton" type="button">
              <i class="fas fa-rotate"></i>
            </button>
          </div>
          <div class="history-list" id="historyList"></div>
        </div>

        <article class="panel-card sidebar-tool simulator-card">
          <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
            <div>
              <p class="panel-eyebrow">Strumento</p>
              <h3 class="utility-title">Simulatore forfettario</h3>
            </div>
            <button class="btn btn-outline-primary btn-sm" id="toggleSimulatorButton" type="button">
              Apri
            </button>
          </div>

          <div class="simulator-body" id="simulatorBody" hidden>
            <form id="simulatorForm" class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Ricavi</label>
                <input class="form-control" id="simRicavi" type="number" min="0" step="0.01" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Codice ATECO</label>
                <input class="form-control" id="simAteco" type="text" placeholder="es. 62.01" />
              </div>
              <div class="col-md-6">
                <label class="form-label">Coefficiente % opzionale</label>
                <input class="form-control" id="simCoeff" type="number" min="0" max="100" step="0.01" />
              </div>
              <div class="col-md-6">
                <label class="form-label">Aliquota imposta</label>
                <select class="form-select" id="simAliquota">
                  <option value="0.15">15%</option>
                  <option value="0.05">5%</option>
                </select>
              </div>
              <div class="col-md-7">
                <label class="form-label">Gestione previdenziale</label>
                <select class="form-select" id="simGestione">
                  <option value="nessuna">Nessuna</option>
                  <option value="gestione_separata">Gestione separata</option>
                  <option value="artigiani_commercianti">Artigiani e commercianti</option>
                </select>
              </div>
              <div class="col-md-5">
                <label class="form-label">Aliquota contributiva %</label>
                <input class="form-control" id="simContributi" type="number" min="0" max="100" step="0.01" />
              </div>
              <div class="col-12">
                <div class="form-check">
                  <input class="form-check-input" id="simRiduzione" type="checkbox" />
                  <label class="form-check-label" for="simRiduzione">
                    Applica riduzione INPS 35% se compatibile
                  </label>
                </div>
              </div>
              <div class="col-12">
                <button class="btn btn-primary" type="submit">Calcola</button>
              </div>
            </form>
            <div class="simulator-result" id="simulatorResult"></div>
          </div>
        </article>
      </aside>

      <main class="main-stage">
        <section class="chat-stage panel-card">
          <div class="chat-stage-head">
            <div>
              <p class="panel-eyebrow">Assistente</p>
              <h2 class="panel-title">Chat normativa</h2>
            </div>
            <span class="history-badge">Regime forfettario</span>
          </div>
          <div class="chat-container" id="chatBox"></div>
        </section>
      </main>
    </div>

    <div class="input-area">
      <div class="container-fluid shell-container">
        <form id="chatForm" class="chat-composer">
          <div class="composer-frame">
            <div class="composer-input-group">
              <span class="composer-icon" aria-hidden="true">
                <i class="fas fa-comment-dots"></i>
              </span>
              <input
                id="chatInput"
                type="text"
                class="form-control form-control-lg"
                placeholder="Es: Quando serve l'iscrizione VIES?"
                required
              />
              <button class="btn btn-primary btn-lg composer-submit" type="submit">
                <i class="fas fa-paper-plane"></i>
                <span>Invia</span>
              </button>
            </div>
            <div class="composer-meta">
              <small class="text-muted disclaimer-text">
                FlyTax AI può commettere errori. Verificare sempre le fonti e usare il simulatore solo come stima orientativa.
              </small>
              <span class="composer-shortcut">Invio per inviare</span>
            </div>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const chatForm = document.getElementById("chatForm");
      const chatBox = document.getElementById("chatBox");
      const inputField = chatForm.querySelector("input");
      const sendButton = chatForm.querySelector("button[type='submit']");
      const historyList = document.getElementById("historyList");
      const themeToggle = document.getElementById("themeToggle");
      const newChatButton = document.getElementById("newChatButton");
      const refreshHistoryButton = document.getElementById("refreshHistoryButton");
      const toggleSimulatorButton = document.getElementById("toggleSimulatorButton");
      const simulatorBody = document.getElementById("simulatorBody");
      const simulatorForm = document.getElementById("simulatorForm");
      const simulatorResult = document.getElementById("simulatorResult");
      const CHAT_STORAGE_KEY = "flytax-chat-history-v2";
      const CURRENT_CHAT_ID_KEY = "flytax-current-chat-id";
      const DEFAULT_API_BASE = "http://localhost:8000";
      const INTRO_MESSAGE =
        "Benvenuto nel workspace FlyTax. Qui lavori solo sul regime forfettario: puoi interrogare la normativa, consultare le fonti con estratti e pagine, salvare la cronologia e usare il simulatore senza uscire dalla stessa interfaccia.";

      let isRequestInFlight = false;
      let chatHistory = [];
      let serverHistory = [];
      let currentChatId = loadOrCreateChatId();

      initialize();

      async function initialize() {
        syncThemeToggle();
        restoreLocalChat();
        renderChat();
        await loadServerHistory();
      }

      themeToggle.addEventListener("click", function () {
        const isDark = document.documentElement.getAttribute("data-theme") === "dark";
        if (isDark) {
          document.documentElement.removeAttribute("data-theme");
          localStorage.setItem("flytax-theme", "light");
        } else {
          document.documentElement.setAttribute("data-theme", "dark");
          localStorage.setItem("flytax-theme", "dark");
        }
        syncThemeToggle();
      });

      function syncThemeToggle() {
        const isDark = document.documentElement.getAttribute("data-theme") === "dark";
        themeToggle.innerHTML = isDark
          ? '<i class="fas fa-sun"></i><span>Tema chiaro</span>'
          : '<i class="fas fa-moon"></i><span>Tema scuro</span>';
        themeToggle.setAttribute(
          "aria-label",
          isDark ? "Attiva tema chiaro" : "Attiva tema scuro",
        );
      }

      chatForm.addEventListener("submit", async function (e) {
        e.preventDefault();

        const userText = inputField.value.trim();
        if (!userText || isRequestInFlight) return;

        isRequestInFlight = true;
        inputField.disabled = true;
        sendButton.disabled = true;

        addMessage({ sender: "user", text: userText, sources: [], sourceDetails: [] });
        inputField.value = "";

        const loadingDiv = createLoadingIndicator();
        chatBox.appendChild(loadingDiv);
        scrollChatToBottom();

        try {
          const response = await fetch(`${getApiBaseUrl()}/`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              content: userText,
              regime_id: "forfettario",
              chat_id: currentChatId,
            }),
          });

          if (!response.ok) throw new Error("Errore dal server");

          const data = await response.json();
          removeLoadingIndicator(loadingDiv);

          const assistantMessage = {
            sender: "ai",
            text: data.message,
            sources: normalizeSources(data.sources),
            sourceDetails: normalizeSourceDetails(data.source_details || []),
            confidenceLabel: data.confidence_label || null,
            confidenceScore: typeof data.confidence_score === "number" ? data.confidence_score : null,
            retrievalMode: data.retrieval_mode || null,
          };
          addMessage(assistantMessage, { animate: true });
          await persistTurn(userText, assistantMessage);
          await loadServerHistory();
        } catch (error) {
          console.error("Errore:", error);
          removeLoadingIndicator(loadingDiv);
          addMessage(
            {
              sender: "ai",
              text: "Spiacente, impossibile connettersi al server. Controlla l'endpoint API salvato e verifica che FastAPI sia avviato.",
              sources: [],
              sourceDetails: [],
            },
            { animate: true },
          );
        } finally {
          isRequestInFlight = false;
          inputField.disabled = false;
          sendButton.disabled = false;
          inputField.focus();
        }
      });

      newChatButton.addEventListener("click", function () {
        if (isRequestInFlight) return;
        currentChatId = createMessageId();
        localStorage.setItem(CURRENT_CHAT_ID_KEY, currentChatId);
        chatHistory = [];
        saveChatHistory();
        renderChat();
        inputField.value = "";
        inputField.focus();
      });

      refreshHistoryButton.addEventListener("click", function () {
        loadServerHistory();
      });

      toggleSimulatorButton.addEventListener("click", function () {
        const willOpen = simulatorBody.hidden;
        simulatorBody.hidden = !willOpen;
        toggleSimulatorButton.textContent = willOpen ? "Chiudi" : "Apri";
      });

      simulatorForm.addEventListener("submit", async function (event) {
        event.preventDefault();
        simulatorResult.innerHTML = "<p class='text-muted mb-0'>Calcolo in corso…</p>";
        try {
          const payload = {
            regime_id: "forfettario",
            ricavi: Number(document.getElementById("simRicavi").value),
            ateco_code: document.getElementById("simAteco").value.trim() || null,
            coefficiente_redditivita: toNullableNumber(document.getElementById("simCoeff").value),
            aliquota_imposta: Number(document.getElementById("simAliquota").value),
            gestione_previdenziale: document.getElementById("simGestione").value,
            aliquota_contributiva: toNullableNumber(document.getElementById("simContributi").value),
            riduzione_inps_35: document.getElementById("simRiduzione").checked,
          };
          const response = await fetch(`${getApiBaseUrl()}/simulate`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.detail || "Simulazione non disponibile");
          simulatorResult.innerHTML = `
            <div class="sim-result-grid">
              ${data.breakdown
                .map(
                  (item) => `
                    <div class="sim-result-item">
                      <span>${item.label}</span>
                      <strong>${formatCurrency(item.amount)}</strong>
                    </div>`,
                )
                .join("")}
            </div>
            <div class="sim-note-list">
              ${data.notes.map((note) => `<p>${note}</p>`).join("")}
            </div>
          `;
        } catch (error) {
          simulatorResult.innerHTML = `<p class="text-danger mb-0">${error.message}</p>`;
        }
      });

      async function loadServerHistory() {
        try {
          const response = await fetch(`${getApiBaseUrl()}/chat-history`);
          if (!response.ok) throw new Error("Cronologia non disponibile");
          serverHistory = await response.json();
          renderHistoryList();
        } catch (error) {
          historyList.innerHTML = "<p class='empty-history'>Cronologia server non disponibile.</p>";
        }
      }

      async function persistTurn(userText, assistantMessage) {
        try {
          await fetch(`${getApiBaseUrl()}/chat-history`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              chat_id: currentChatId,
              regime_id: "forfettario",
              user_message: userText,
              assistant_message: assistantMessage.text,
              assistant_sources: assistantMessage.sources,
              confidence_label: assistantMessage.confidenceLabel,
              confidence_score: assistantMessage.confidenceScore,
              retrieval_mode: assistantMessage.retrievalMode,
            }),
          });
        } catch (error) {
          console.error("Persistenza chat fallita:", error);
        }
      }

      async function openChat(chatId) {
        try {
          const response = await fetch(`${getApiBaseUrl()}/chat-history/${chatId}`);
          if (!response.ok) throw new Error("Chat non disponibile");
          const transcript = await response.json();
          currentChatId = transcript.chat_id;
          localStorage.setItem(CURRENT_CHAT_ID_KEY, currentChatId);
          chatHistory = transcript.messages.map((message) => ({
            sender: message.role === "assistant" ? "ai" : "user",
            text: message.text,
            sources: normalizeSources(message.sources),
            sourceDetails: [],
          }));
          saveChatHistory();
          renderChat();
        } catch (error) {
          console.error("Apertura chat fallita:", error);
        }
      }

      async function deleteChat(chatId) {
        try {
          const response = await fetch(`${getApiBaseUrl()}/chat-history/${chatId}`, {
            method: "DELETE",
          });
          if (!response.ok) throw new Error("Eliminazione fallita");
          if (chatId === currentChatId) {
            currentChatId = createMessageId();
            localStorage.setItem(CURRENT_CHAT_ID_KEY, currentChatId);
            chatHistory = [];
            saveChatHistory();
            renderChat();
          }
          await loadServerHistory();
        } catch (error) {
          console.error("Eliminazione chat fallita:", error);
        }
      }

      function renderHistoryList() {
        if (!serverHistory.length) {
          historyList.innerHTML = "<p class='empty-history'>Nessuna chat salvata.</p>";
          return;
        }
        historyList.innerHTML = serverHistory
          .map(
            (item) => `
              <div class="history-item ${item.chat_id === currentChatId ? "is-active" : ""}">
                <button class="history-open-btn" type="button" data-open-chat="${item.chat_id}">
                  <strong>${escapeHtml(item.title)}</strong>
                  <span>${item.message_count} msg</span>
                </button>
                <button class="history-delete-btn" type="button" data-delete-chat="${item.chat_id}">
                  <i class="fas fa-trash"></i>
                </button>
              </div>`,
          )
          .join("");

        historyList.querySelectorAll("[data-open-chat]").forEach((button) => {
          button.addEventListener("click", () => openChat(button.dataset.openChat));
        });
        historyList.querySelectorAll("[data-delete-chat]").forEach((button) => {
          button.addEventListener("click", () => deleteChat(button.dataset.deleteChat));
        });
      }

      function loadOrCreateChatId() {
        const existing = localStorage.getItem(CURRENT_CHAT_ID_KEY);
        if (existing) return existing;
        const next = createMessageId();
        localStorage.setItem(CURRENT_CHAT_ID_KEY, next);
        return next;
      }

      function createMessageId() {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return window.crypto.randomUUID();
        }
        return `msg-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function getApiBaseUrl() {
        return DEFAULT_API_BASE;
      }

      function normalizeSources(sources) {
        return Array.isArray(sources) ? sources.filter(Boolean) : [];
      }

      function normalizeSourceDetails(details) {
        return Array.isArray(details)
          ? details.filter((item) => item && item.source)
          : [];
      }

      function restoreLocalChat() {
        try {
          const raw = localStorage.getItem(CHAT_STORAGE_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed)) {
            chatHistory = parsed;
          }
        } catch (error) {
          console.error("Cronologia locale non leggibile:", error);
        }
      }

      function saveChatHistory() {
        localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(chatHistory.slice(-100)));
      }

      function addMessage(message, options = {}) {
        chatHistory.push({
          id: createMessageId(),
          sender: message.sender,
          text: message.text,
          sources: normalizeSources(message.sources),
          sourceDetails: normalizeSourceDetails(message.sourceDetails),
          confidenceLabel: message.confidenceLabel || null,
          confidenceScore: message.confidenceScore || null,
          retrievalMode: message.retrievalMode || null,
        });
        saveChatHistory();
        renderMessage(chatHistory[chatHistory.length - 1], options);
      }

      function renderChat() {
        chatBox.innerHTML = "";
        renderMessage(
          {
            id: "intro",
            sender: "ai",
            text: INTRO_MESSAGE,
            sources: [],
            sourceDetails: [],
          },
          { isIntro: true },
        );
        chatHistory.forEach((message) => renderMessage(message));
        scrollChatToBottom();
      }

      function renderMessage(message, options = {}) {
        const { animate = false, isIntro = false } = options;
        const msgDiv = document.createElement("div");
        msgDiv.className =
          message.sender === "user"
            ? "message-user"
            : "message-ai d-flex align-items-end mb-3";

        if (message.sender === "user") {
          msgDiv.innerHTML = `
            <div class="message-card message-card-user">
              <div class="bubble-user">${escapeHtml(message.text)}</div>
              <div class="message-actions message-actions-user">
                <button class="message-action-btn" type="button" aria-label="Copia il messaggio">
                  <i class="fas fa-copy"></i>
                </button>
              </div>
            </div>
          `;
          msgDiv.querySelector("button").addEventListener("click", () => copyText(message.text));
          chatBox.appendChild(msgDiv);
          return;
        }

        const confidenceChip = message.confidenceLabel
          ? `<span class="confidence-chip confidence-${message.confidenceLabel}">Confidenza ${message.confidenceLabel}</span>`
          : "";
        const sourceMarkup = renderSourceMarkup(message);
        msgDiv.innerHTML = `
          <img src="robot.png" alt="Robot" class="chat-avatar" />
          <div class="message-card message-card-ai">
            <div class="bubble-ai">
              ${confidenceChip}
              <p class="mb-2 ai-text-container"></p>
              ${sourceMarkup}
            </div>
            <div class="message-actions message-actions-ai"></div>
          </div>
        `;
        chatBox.appendChild(msgDiv);

        const textContainer = msgDiv.querySelector(".ai-text-container");
        const actions = msgDiv.querySelector(".message-actions");
        buildAiActions(actions, message, { isIntro });

        if (animate) {
          const words = message.text.split(" ");
          let index = 0;
          function typeWriter() {
            if (index < words.length) {
              textContainer.textContent += `${words[index]} `;
              scrollChatToBottom();
              index++;
              setTimeout(typeWriter, 22);
              return;
            }
            scrollChatToBottom();
          }
          typeWriter();
          return;
        }

        textContainer.textContent = message.text;
      }

      function renderSourceMarkup(message) {
        const items = message.sourceDetails.length
          ? message.sourceDetails
          : message.sources.map((source) => ({ source }));
        if (!items.length) return "";
        return `
          <div class="source-grid">
            ${items
              .map((item) => {
                const pageLabel =
                  item.page_start && item.page_end && item.page_start !== item.page_end
                    ? `Pagine ${item.page_start}-${item.page_end}`
                    : item.page_start
                      ? `Pagina ${item.page_start}`
                      : "Pagina non disponibile";
                const scoreLabel =
                  typeof item.score === "number" ? `<span>Score ${item.score.toFixed(3)}</span>` : "";
                return `
                  <article class="source-card">
                    <div class="source-card-head">
                      <strong>${escapeHtml(item.source)}</strong>
                      <span>${pageLabel}</span>
                    </div>
                    ${item.excerpt ? `<p>${escapeHtml(item.excerpt)}</p>` : ""}
                    <div class="source-card-meta">${scoreLabel}</div>
                  </article>
                `;
              })
              .join("")}
          </div>
        `;
      }

      function buildAiActions(container, message, options = {}) {
        const { isIntro = false } = options;
        if (isIntro) return;

        const copyButton = createActionButton("fa-copy", "Copia risposta", () => {
          copyText(buildExportText(message));
          flashActionState(copyButton, "Copiato");
        });
        const exportButton = createActionButton("fa-file-arrow-down", "Esporta risposta", () => {
          downloadTextFile(`flytax-${Date.now()}.txt`, buildExportText(message));
          flashActionState(exportButton, "Esportato");
        });
        const upButton = createActionButton("fa-thumbs-up", "Feedback positivo", () => sendFeedback("up", message, upButton));
        const downButton = createActionButton("fa-thumbs-down", "Feedback negativo", () => sendFeedback("down", message, downButton));

        container.append(copyButton, exportButton, upButton, downButton);
      }

      function createActionButton(iconClass, label, handler) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "message-action-btn";
        button.title = label;
        button.setAttribute("aria-label", label);
        button.innerHTML = `<i class="fas ${iconClass}"></i>`;
        button.addEventListener("click", handler);
        return button;
      }

      async function sendFeedback(vote, message, button) {
        try {
          await fetch(`${getApiBaseUrl()}/feedback`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              chat_id: currentChatId,
              message: message.text,
              vote,
              regime_id: "forfettario",
              assistant_sources: message.sources,
            }),
          });
          flashActionState(button, "Salvato");
        } catch (error) {
          flashActionState(button, "Errore");
        }
      }

      function buildExportText(message) {
        const sourceLines = message.sourceDetails.length
          ? message.sourceDetails
              .map((item) => {
                const pagePart = item.page_start ? `, pagina ${item.page_start}` : "";
                return `- ${item.source}${pagePart}`;
              })
              .join("\n")
          : message.sources.map((source) => `- ${source}`).join("\n");
        return `${message.text}\n\nFonti:\n${sourceLines || "- Nessuna fonte disponibile"}`;
      }

      function copyText(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text);
          return;
        }
        const tempArea = document.createElement("textarea");
        tempArea.value = text;
        tempArea.style.position = "absolute";
        tempArea.style.left = "-9999px";
        document.body.appendChild(tempArea);
        tempArea.select();
        document.execCommand("copy");
        document.body.removeChild(tempArea);
      }

      function flashActionState(button, label) {
        const original = button.innerHTML;
        button.innerHTML = '<i class="fas fa-check"></i>';
        button.disabled = true;
        button.setAttribute("aria-label", label);
        setTimeout(() => {
          button.innerHTML = original;
          button.disabled = false;
        }, 1200);
      }

      function downloadTextFile(filename, content) {
        const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        link.click();
        URL.revokeObjectURL(url);
      }

      function createLoadingIndicator() {
        const loadingDiv = document.createElement("div");
        loadingDiv.className = "message-ai d-flex align-items-end mb-3";
        loadingDiv.id = "loadingIndicator";
        loadingDiv.innerHTML = `
          <img src="robot.png" alt="Robot" class="chat-avatar" />
          <div class="bubble-ai" style="padding: 12px 24px;">
            <div class="spinner-grow spinner-grow-sm text-primary opacity-50" role="status"></div>
            <div class="spinner-grow spinner-grow-sm text-primary opacity-75 mx-1" role="status"></div>
            <div class="spinner-grow spinner-grow-sm text-primary" role="status"></div>
          </div>
        `;
        return loadingDiv;
      }

      function removeLoadingIndicator(loadingDiv) {
        if (loadingDiv && loadingDiv.parentNode) {
          loadingDiv.remove();
        }
      }

      function scrollChatToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function toNullableNumber(value) {
        if (value === "" || value === null || typeof value === "undefined") return null;
        const numericValue = Number(value);
        return Number.isNaN(numericValue) ? null : numericValue;
      }

      function formatCurrency(value) {
        return new Intl.NumberFormat("it-IT", {
          style: "currency",
          currency: "EUR",
          maximumFractionDigits: 2,
        }).format(value);
      }
    </script>
  </body>
</html>
