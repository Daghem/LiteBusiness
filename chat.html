<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlyTax - Assistente Forfettario</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div
      class="fixed-top d-flex justify-content-center mt-4 px-3"
      style="z-index: 1030; gap: 12px"
    >
      <nav
        class="navbar navbar-dark shadow-lg py-2 px-4"
        style="
          background-color: rgba(15, 15, 15, 0.85);
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
          border-radius: 50px;
          width: 100%;
          max-width: 1200px;
          border: 1px solid rgba(255, 255, 255, 0.1);
        "
      >
        <div
          class="container-fluid ps-0 pe-0 d-flex justify-content-between align-items-center"
        >
          <a
            class="navbar-brand d-flex align-items-center m-0"
            href="index.html"
          >
            <img
              src="logo.png"
              alt="FlyTax Logo"
              class="me-2"
              style="height: 35px; width: auto"
            />
            <span class="fw-bold fs-5 mb-0 text-white"
              >Fly<span class="text-primary">Tax</span></span
            >
          </a>

          <div class="d-flex align-items-center gap-3">
            <span
              class="history-badge d-none d-md-inline border-0 text-white-50"
              >Cronologia salvata</span
            >
            <button
              class="btn btn-outline-light rounded-pill px-4 py-1 fw-bold border-0 history-reset-btn"
              id="resetChatButton"
              type="button"
            >
              Nuova chat
            </button>
          </div>
        </div>
      </nav>

      <div
        class="d-flex align-items-center justify-content-center px-3 shadow-lg"
        style="
          background-color: rgba(15, 15, 15, 0.85);
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
          border-radius: 50px;
          border: 1px solid rgba(255, 255, 255, 0.1);
        "
      >
        <label class="theme-switch m-0" for="checkbox">
          <input type="checkbox" id="checkbox" />
          <div class="slider round">
            <i class="bi bi-moon-stars-fill text-light slider-icon"></i>
            <i class="bi bi-sun-fill text-warning slider-icon"></i>
          </div>
        </label>
      </div>
    </div>
    <div class="container chat-container" id="chatBox"></div>

    <div class="input-area">
      <div class="container">
        <form id="chatForm">
          <div class="input-group">
            <input
              type="text"
              class="form-control form-control-lg"
              placeholder="Es: Posso scaricare le spese auto?"
              required
            />
            <button class="btn btn-primary btn-lg" type="submit">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
          <div class="text-center mt-2">
            <small class="text-muted" style="font-size: 0.7rem"
              >FlyTax AI può commettere errori. Verificare sempre le fonti
              citate.</small
            >
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // --- LOGICA DELLA CHAT (Invariata) ---
      const chatForm = document.getElementById("chatForm");
      const chatBox = document.getElementById("chatBox");
      const inputField = chatForm.querySelector("input");
      const sendButton = chatForm.querySelector("button[type='submit']");
      const resetChatButton = document.getElementById("resetChatButton");
      const CHAT_STORAGE_KEY = "flytax-chat-history-v1";
      const INTRO_MESSAGE =
        "Buongiorno. Sono l'assistente virtuale di FlyTax.\nPonimi un quesito sul Regime Forfettario e analizzerò le normative ufficiali per te.";
      let isRequestInFlight = false;
      let chatHistory = [];

      initializeChat();

      chatForm.addEventListener("submit", async function (e) {
        e.preventDefault();
        const userText = inputField.value.trim();
        if (!userText || isRequestInFlight) return;

        isRequestInFlight = true;
        inputField.disabled = true;
        sendButton.disabled = true;

        addMessage("user", userText, []);
        inputField.value = "";

        const loadingDiv = createLoadingIndicator();
        chatBox.appendChild(loadingDiv);
        scrollChatToBottom();

        try {
          const response = await fetch("http://localhost:8000/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content: userText }),
          });

          if (!response.ok) throw new Error("Errore dal server");

          const data = await response.json();
          removeLoadingIndicator(loadingDiv);
          addMessage(
            "ai",
            data.message,
            Array.isArray(data.sources) ? data.sources : [],
            {
              animate: true,
            },
          );
        } catch (error) {
          console.error("Errore:", error);
          removeLoadingIndicator(loadingDiv);
          addMessage(
            "ai",
            "Spiacente, impossibile connettersi al server. Assicurati che FastAPI sia avviato sulla porta 8000.",
            [],
            { animate: true },
          );
        } finally {
          isRequestInFlight = false;
          inputField.disabled = false;
          sendButton.disabled = false;
          inputField.focus();
        }
      });

      resetChatButton.addEventListener("click", function () {
        if (isRequestInFlight) return;
        chatHistory = [];
        localStorage.removeItem(CHAT_STORAGE_KEY);
        renderChat();
        inputField.value = "";
        inputField.focus();
      });

      function initializeChat() {
        chatHistory = loadChatHistory();
        renderChat();
      }

      function createMessageId() {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return window.crypto.randomUUID();
        }
        return `msg-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function normalizeSources(sources) {
        return Array.isArray(sources) ? sources.filter(Boolean) : [];
      }

      function loadChatHistory() {
        try {
          const raw = localStorage.getItem(CHAT_STORAGE_KEY);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return [];
          return parsed
            .filter((item) => item && item.sender && item.text)
            .map((item) => ({
              id: item.id || createMessageId(),
              sender: item.sender,
              text: item.text,
              sources: normalizeSources(item.sources),
            }));
        } catch (error) {
          console.error("Cronologia non leggibile:", error);
          return [];
        }
      }

      function saveChatHistory() {
        try {
          localStorage.setItem(
            CHAT_STORAGE_KEY,
            JSON.stringify(chatHistory.slice(-100)),
          );
        } catch (error) {
          console.error("Cronologia non salvabile:", error);
        }
      }

      function addMessage(sender, text, sources = [], options = {}) {
        const message = {
          id: createMessageId(),
          sender,
          text,
          sources: normalizeSources(sources),
        };
        chatHistory.push(message);
        saveChatHistory();
        renderMessage(message, {
          animate: options.animate === true && sender === "ai",
        });
      }

      function renderChat() {
        chatBox.innerHTML = "";
        renderIntroMessage();
        chatHistory.forEach((message) =>
          renderMessage(message, { animate: false }),
        );
        scrollChatToBottom();
      }

      function renderIntroMessage() {
        const introMessage = {
          id: "intro",
          sender: "ai",
          text: INTRO_MESSAGE,
          sources: [],
        };
        renderMessage(introMessage, { animate: false, isIntro: true });
      }

      function renderMessage(message, options = {}) {
        const { animate = false, isIntro = false } = options;
        const msgDiv = document.createElement("div");
        msgDiv.dataset.messageId = message.id;
        msgDiv.className =
          message.sender === "user"
            ? "message-user"
            : "message-ai d-flex align-items-end mb-3";

        if (message.sender === "user") {
          const contentWrap = document.createElement("div");
          contentWrap.className = "message-card message-card-user";

          const bubble = document.createElement("div");
          bubble.className = "bubble-user";
          bubble.textContent = message.text;

          const actions = createMessageActions(message, { isIntro });
          contentWrap.appendChild(bubble);
          contentWrap.appendChild(actions);
          msgDiv.appendChild(contentWrap);
          chatBox.appendChild(msgDiv);
          scrollChatToBottom();
          return;
        }

        msgDiv.innerHTML = `
          <img src="robot.png" alt="Robot" class="me-2 mb-1" style="width: 65px; height: 65px; object-fit: contain;">
          <div class="message-card message-card-ai">
            <div class="bubble-ai">
              <p class="mb-2 ai-text-container"></p>
              ${
                message.sources.length > 0
                  ? `
              <div class="source-box" style="display: none;">
                <i class="fas fa-book me-1"></i> <strong>Informazione:</strong><br>
                <span class="source-link" style="color: #27ae60;">${message.sources.join("<br>")}</span>
              </div>`
                  : ""
              }
            </div>
          </div>
        `;
        chatBox.appendChild(msgDiv);

        const card = msgDiv.querySelector(".message-card-ai");
        const textContainer = msgDiv.querySelector(".ai-text-container");
        const sourceBox = msgDiv.querySelector(".source-box");

        if (animate) {
          const words = message.text.split(" ");
          let index = 0;

          function typeWriter() {
            if (index < words.length) {
              textContainer.textContent += `${words[index]} `;
              scrollChatToBottom();
              index++;
              setTimeout(typeWriter, 40);
              return;
            }
            if (sourceBox) {
              sourceBox.style.display = "block";
            }
            card.appendChild(createMessageActions(message, { isIntro }));
            scrollChatToBottom();
          }

          typeWriter();
          return;
        }

        textContainer.textContent = message.text;
        if (sourceBox) {
          sourceBox.style.display =
            message.sources.length > 0 ? "block" : "none";
        }
        card.appendChild(createMessageActions(message, { isIntro }));
        scrollChatToBottom();
      }

      function createMessageActions(message, options = {}) {
        const { isIntro = false } = options;
        const actions = document.createElement("div");
        actions.className =
          message.sender === "user"
            ? "message-actions message-actions-user"
            : "message-actions message-actions-ai";

        if (!isIntro) {
          const copyButton = document.createElement("button");
          copyButton.type = "button";
          copyButton.className = "message-action-btn";
          copyButton.innerHTML =
            '<i class="fas fa-copy" aria-hidden="true"></i>';
          copyButton.title = "Copia il messaggio";
          copyButton.setAttribute("aria-label", "Copia il messaggio");
          copyButton.addEventListener("click", () =>
            copyMessage(message, copyButton),
          );
          actions.appendChild(copyButton);
        }

        if (message.sender === "user" && !isIntro) {
          const editButton = document.createElement("button");
          editButton.type = "button";
          editButton.className = "message-action-btn";
          editButton.innerHTML =
            '<i class="fas fa-pen" aria-hidden="true"></i>';
          editButton.title =
            "Riapre il messaggio e rimuove le risposte successive";
          editButton.setAttribute("aria-label", "Modifica il messaggio");
          editButton.addEventListener("click", () =>
            editUserMessage(message.id),
          );
          actions.appendChild(editButton);
        }

        return actions;
      }

      async function copyMessage(message, button) {
        const textToCopy =
          message.sender === "ai" && message.sources.length > 0
            ? `${message.text}\n\nFonti:\n${message.sources.join("\n")}`
            : message.text;

        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(textToCopy);
          } else {
            fallbackCopyText(textToCopy);
          }
          flashActionState(button, "Copiato");
        } catch (error) {
          console.error("Copia non riuscita:", error);
          flashActionState(button, "Errore");
        }
      }

      function fallbackCopyText(text) {
        const tempArea = document.createElement("textarea");
        tempArea.value = text;
        tempArea.setAttribute("readonly", "");
        tempArea.style.position = "absolute";
        tempArea.style.left = "-9999px";
        document.body.appendChild(tempArea);
        tempArea.select();
        document.execCommand("copy");
        document.body.removeChild(tempArea);
      }

      function flashActionState(button, label) {
        const original = button.innerHTML;
        button.innerHTML = '<i class="fas fa-check" aria-hidden="true"></i>';
        button.setAttribute("aria-label", label);
        button.disabled = true;
        setTimeout(() => {
          button.innerHTML = original;
          button.setAttribute(
            "aria-label",
            original.includes("fa-pen")
              ? "Modifica il messaggio"
              : "Copia il messaggio",
          );
          button.disabled = false;
        }, 1200);
      }

      function editUserMessage(messageId) {
        if (isRequestInFlight) return;
        const targetIndex = chatHistory.findIndex(
          (message) => message.id === messageId,
        );
        if (targetIndex === -1) return;

        inputField.value = chatHistory[targetIndex].text;
        chatHistory = chatHistory.slice(0, targetIndex);
        saveChatHistory();
        renderChat();
        inputField.focus();
        inputField.setSelectionRange(
          inputField.value.length,
          inputField.value.length,
        );
      }

      function createLoadingIndicator() {
        const loadingDiv = document.createElement("div");
        loadingDiv.className = "message-ai d-flex align-items-end mb-3";
        loadingDiv.id = "loadingIndicator";
        loadingDiv.innerHTML = `
          <img src="robot.png" alt="Robot" class="me-2 mb-1" style="width: 65px; height: 65px; object-fit: contain;">
          <div class="bubble-ai" style="padding: 12px 24px;">
            <div class="spinner-grow spinner-grow-sm text-primary opacity-50" role="status"></div>
            <div class="spinner-grow spinner-grow-sm text-primary opacity-75 mx-1" role="status"></div>
            <div class="spinner-grow spinner-grow-sm text-primary" role="status"></div>
          </div>
        `;
        return loadingDiv;
      }

      function removeLoadingIndicator(loadingDiv) {
        if (loadingDiv && loadingDiv.parentNode) {
          loadingDiv.remove();
        }
      }

      function scrollChatToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
      }
    </script>

    <script>
      // --- LOGICA DARK MODE CONDIVISA CON LA HOME ---
      const toggleSwitch = document.querySelector(
        '.theme-switch input[type="checkbox"]',
      );
      const currentTheme = localStorage.getItem("theme");

      if (currentTheme) {
        document.documentElement.setAttribute("data-bs-theme", currentTheme);
        if (currentTheme === "dark") {
          toggleSwitch.checked = true;
          document.body.classList.add("dark-custom");
        }
      }

      toggleSwitch.addEventListener("change", function (e) {
        if (e.target.checked) {
          document.documentElement.setAttribute("data-bs-theme", "dark");
          document.body.classList.add("dark-custom");
          localStorage.setItem("theme", "dark");
        } else {
          document.documentElement.setAttribute("data-bs-theme", "light");
          document.body.classList.remove("dark-custom");
          localStorage.setItem("theme", "light");
        }
      });
    </script>
  </body>
</html>
