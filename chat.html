<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlyTax - Assistente Forfettario</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="chat-header d-flex align-items-center">
      <div class="container d-flex align-items-center">
        <a
          class="navbar-brand-chat fw-bold fs-3"
          href="index.html"
          style="text-decoration: none; color: inherit"
        >
          <img src="logo.png" alt="FlyTax Logo" class="chat-logo" />
          Fly<span class="text-primary">Tax</span>
        </a>
      </div>
    </div>

    <div class="container chat-container" id="chatBox">
      <div class="message-ai d-flex align-items-end mb-3">
        <img
          src="robot.png"
          alt="Robot"
          class="me-2 mb-1"
          style="width: 65px; height: 65px; object-fit: contain"
        />
        <div class="bubble-ai">
          <p class="mb-0">
            Buongiorno. Sono l'assistente virtuale di
            <strong>FlyTax</strong>. <br />Ponimi un quesito sul Regime
            Forfettario e analizzerò le normative ufficiali per te.
          </p>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="container">
        <form id="chatForm">
          <div class="input-group">
            <input
              type="text"
              class="form-control form-control-lg"
              placeholder="Es: Posso scaricare le spese auto?"
              required
            />
            <button class="btn btn-primary btn-lg" type="submit">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
          <div class="text-center mt-2">
            <small class="text-muted" style="font-size: 0.7rem"
              >FlyTax AI può commettere errori. Verificare sempre le fonti
              citate.</small
            >
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      const chatForm = document.getElementById("chatForm");
      const chatBox = document.getElementById("chatBox");
      const inputField = chatForm.querySelector("input");
      const sendButton = chatForm.querySelector("button[type='submit']");
      let isRequestInFlight = false;

      chatForm.addEventListener("submit", async function (e) {
        e.preventDefault();

        const userText = inputField.value.trim();
        if (!userText) return;
        if (isRequestInFlight) return;

        isRequestInFlight = true;
        inputField.disabled = true;
        sendButton.disabled = true;

        appendMessage("user", userText);
        inputField.value = "";

        const loadingDiv = document.createElement("div");
        loadingDiv.className = "message-ai d-flex align-items-end mb-3";
        loadingDiv.id = "loadingIndicator";
        loadingDiv.innerHTML = `
          <img src="robot.png" alt="Robot" class="me-2 mb-1" style="width: 65px; height: 65px; object-fit: contain;">
          <div class="bubble-ai" style="padding: 12px 24px;">
            <div class="spinner-grow spinner-grow-sm text-primary opacity-50" role="status"></div>
              <div class="spinner-grow spinner-grow-sm text-primary opacity-75 mx-1" role="status"></div>
              <div class="spinner-grow spinner-grow-sm text-primary" role="status"></div>
          </div>
        `;
        chatBox.appendChild(loadingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
          const response = await fetch("http://localhost:8000/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content: userText }),
          });

          if (!response.ok) throw new Error("Errore dal server");

          const data = await response.json();

          if (loadingDiv.parentNode) {
            loadingDiv.remove();
          }

          const aiReply = data.message;
          const aiSources = Array.isArray(data.sources) ? data.sources : [];

          appendMessage("ai", aiReply, aiSources);
        } catch (err) {
          console.error("Errore:", err);

          if (loadingDiv.parentNode) {
            loadingDiv.remove();
          }

          appendMessage(
            "ai",
            "Spiacente, impossibile connettersi al server. Assicurati che FastAPI sia avviato sulla porta 8000.",
          );
        } finally {
          isRequestInFlight = false;
          inputField.disabled = false;
          sendButton.disabled = false;
          inputField.focus();
        }
      });

      function createLoadingIndicator() {
        const wrapper = document.createElement("div");
        wrapper.className = "message-ai";

        const bubble = document.createElement("div");
        bubble.className = "bubble-ai";
        bubble.style.padding = "12px 24px";

        const opacities = ["0.5", "0.75", "1"];
        opacities.forEach((opacity, idx) => {
          const spinner = document.createElement("div");
          spinner.className = "spinner-grow spinner-grow-sm text-primary";
          spinner.setAttribute("role", "status");
          spinner.style.opacity = opacity;
          if (idx === 1) {
            spinner.classList.add("mx-1");
          }
          bubble.appendChild(spinner);
        });

        wrapper.appendChild(bubble);
        return wrapper;
      }

      function appendMessage(sender, text, sources = null) {
        const msgDiv = document.createElement("div");
        msgDiv.className =
          sender === "user"
            ? "message-user"
            : "message-ai d-flex align-items-end mb-3";

        if (sender === "user") {
          const bubble = document.createElement("div");
          bubble.className = "bubble-user";
          bubble.textContent = text;
          msgDiv.appendChild(bubble);
          chatBox.appendChild(msgDiv);
          chatBox.scrollTop = chatBox.scrollHeight;
        } else {
          const sourceList = Array.isArray(sources)
            ? sources.filter(Boolean)
            : sources
              ? [sources]
              : [];

          msgDiv.innerHTML = `
            <img src="robot.png" alt="Robot" class="me-2 mb-1" style="width: 65px; height: 65px; object-fit: contain;">
            <div class="bubble-ai">
                <p class="mb-2 ai-text-container"></p>
                ${
                  sourceList.length > 0
                    ? `
                <div class="source-box" style="display: none;">
                    <i class="fas fa-book me-1"></i> <strong>Informazione:</strong><br>
                    <span class="source-link" style="color: #27ae60;">${sourceList.join("<br>")}</span>
                </div>`
                    : ""
                }
            </div>
          `;
          chatBox.appendChild(msgDiv);
          const textContainer = msgDiv.querySelector(".ai-text-container");
          const sourceBox = msgDiv.querySelector(".source-box");
          const words = text.split(" ");
          let i = 0;

          function typeWriter() {
            if (i < words.length) {
              textContainer.textContent += words[i] + " ";
              chatBox.scrollTop = chatBox.scrollHeight;
              i++;
              setTimeout(typeWriter, 40);
            } else if (sourceBox) {
              sourceBox.style.display = "block";
              chatBox.scrollTop = chatBox.scrollHeight;
            }
          }

          typeWriter();
        }
      }
    </script>
  </body>
</html>
